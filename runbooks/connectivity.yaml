name: connectivity
description: >
  Connectivity blocked/denied troubleshoot.
  Decision tree: path trace → evidence gathering → ping →
    if ping fails: routing check on all hops, then Panorama if firewalls
    if ping passes: TCP port test from last-hop device (if port known), then Panorama if firewalls

steps:
  # ── Step 1: Trace forward and reverse paths in parallel ───────────────────
  - id: path_traces
    parallel:
      - id: path_trace
        tool: path_agent
        input:
          prompt: "{{prompt}}"

      - id: reverse_path_trace
        tool: reverse_path_agent
        input:
          prompt: "{{prompt}}"

  # ── Step 2: Investigate path anomalies (mgmt routing or no-route) ─────────
  - id: path_anomaly_investigation
    if: path_anomaly_detected
    then:
      - id: historical_route
        tool: routing_history_agent
        input:
          device: "{{investigation_device}}"
          destination: "{{dst_ip}}"

      - id: down_interface_investigation
        if: historical_egress_found
        then:
          - id: interface_detail
            tool: interface_detail_agent
            input:
              device: "{{investigation_device}}"
              interface: "{{historical_egress}}"

          - id: device_syslog
            tool: syslog_agent
            input:
              device: "{{investigation_device}}"
              interface: "{{historical_egress}}"
        else:
          # No routing history — check all non-management interfaces + link events
          - id: all_interfaces
            tool: all_interfaces_agent
            input:
              device: "{{investigation_device}}"

          - id: device_syslog_all
            tool: syslog_agent
            input:
              device: "{{investigation_device}}"
              interface: ""

  # ── Step 3: Gather evidence in parallel (regardless of path result) ───────
  - id: gather_evidence
    parallel:
      - id: servicenow
        tool: servicenow_agent
        input:
          device_names: "{{path_devices}}"
          source_ip: "{{src_ip}}"
          dest_ip: "{{dst_ip}}"
          port: "{{port}}"
          query_type: "incidents_and_changes"
          hours_back: 24

      - id: interface_counters
        tool: interface_counters_agent
        input:
          devices_and_interfaces: "{{path_hops_for_counters}}"

  # ── Step 3: Active test — only if we have a first-hop device ─────────────
  - id: connectivity_check
    if: first_hop_device
    then:
      - id: active_pings
        parallel:
          - id: ping_test
            tool: ping_agent
            input:
              device: "{{first_hop_device}}"
              destination: "{{dst_ip}}"
              source_interface: "{{first_hop_lan_interface}}"
              vrf: "{{src_vrf}}"

          - id: reverse_ping_test
            tool: ping_agent
            input:
              device: "{{last_hop_device}}"
              destination: "{{src_ip}}"
              source_interface: "{{last_hop_egress_interface}}"

      # Branch on ping result
      - id: post_ping
        if: ping_failed
        then:
          # Ping failed → routing is suspect, check every hop + OSPF state in parallel
          - id: ping_failed_checks
            parallel:
              - id: routing_check
                tool: routing_check_agent
                input:
                  devices: "{{path_devices}}"
                  destination: "{{dst_ip}}"
                  vrf: "{{src_vrf}}"

              - id: ospf_neighbors
                tool: ospf_agent
                input:
                  devices: "{{path_devices}}"

              - id: ospf_interfaces
                tool: ospf_interfaces_agent
                input:
                  devices: "{{path_devices}}"

              - id: ospf_history
                tool: ospf_history_agent
                input:
                  devices: "{{path_devices}}"

              - id: syslog
                tool: syslog_agent
                input:
                  device: "{{first_hop_device}}"
                  interface: ""

          # If firewalls in path, check policy — may be blocking
          - id: firewall_check
            if: has_firewalls
            then:
              - id: panorama
                tool: panorama_agent
                input:
                  source_ip: "{{src_ip}}"
                  dest_ip: "{{dst_ip}}"
                  firewall_hostnames: "{{firewall_hostnames}}"
                  port: "{{port}}"
                  protocol: "{{protocol}}"
        else:
          # Ping passed — Layer 3 is fine.
          # If a port is known, test TCP from the last-hop device (closest to destination)
          - id: tcp_branch
            if: port
            then:
              - id: tcp_test
                tool: tcp_port_agent
                input:
                  device: "{{last_hop_device}}"
                  destination: "{{dst_ip}}"
                  port: "{{port}}"
                  vrf: "{{src_vrf}}"

          # If firewalls in path, check policy — may be allowing ICMP but blocking app port
          - id: firewall_check
            if: has_firewalls
            then:
              - id: panorama
                tool: panorama_agent
                input:
                  source_ip: "{{src_ip}}"
                  dest_ip: "{{dst_ip}}"
                  firewall_hostnames: "{{firewall_hostnames}}"
                  port: "{{port}}"
                  protocol: "{{protocol}}"

    else:
      # No first-hop device found — path trace couldn't identify hops
      - id: routing_fallback
        if: path_devices
        then:
          - id: routing_check
            tool: routing_check_agent
            input:
              devices: "{{path_devices}}"
              destination: "{{dst_ip}}"
              vrf: "{{src_vrf}}"
        else:
          - id: no_path_note
            message: "Path trace could not identify any network devices. Verify that {{src_ip}} and {{dst_ip}} are reachable and in the device inventory."
