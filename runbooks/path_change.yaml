name: path_change_troubleshoot
description: >
  Path-change troubleshoot: recent config changes that shifted routing.
  7-day ServiceNow window (changes_only). Routing check on every hop to find
  where divergence started. Panorama if firewalls are in the new path.

steps:
  - id: path_trace
    tool: path_agent
    input:
      prompt: "{{prompt}}"

  # 7-day window, changes only — path changes often lag the ticket
  - id: gather_evidence
    parallel:
      - id: servicenow
        tool: servicenow_agent
        input:
          device_names: "{{path_devices}}"
          source_ip: "{{src_ip}}"
          dest_ip: "{{dst_ip}}"
          port: "{{port}}"
          query_type: "changes_only"
          hours_back: 168

      - id: interface_counters
        tool: interface_counters_agent
        input:
          devices_and_interfaces: "{{path_hops_for_counters}}"

  # Routing check always runs — goal is to find where the route diverges
  - id: routing_branch
    if: path_devices
    then:
      - id: routing_check
        tool: routing_check_agent
        input:
          devices: "{{path_devices}}"
          destination: "{{dst_ip}}"
          vrf: "{{src_vrf}}"

      # Active ping to confirm current reachability
      - id: ping_branch
        if: first_hop_device
        then:
          - id: ping_test
            tool: ping_agent
            input:
              device: "{{first_hop_device}}"
              destination: "{{dst_ip}}"
              source_interface: "{{first_hop_lan_interface}}"
              vrf: "{{src_vrf}}"

      # If firewalls in new path, check if policy was updated
      - id: firewall_check
        if: has_firewalls
        then:
          - id: panorama
            tool: panorama_agent
            input:
              source_ip: "{{src_ip}}"
              dest_ip: "{{dst_ip}}"
              firewall_hostnames: "{{firewall_hostnames}}"
              port: "{{port}}"
              protocol: "{{protocol}}"
    else:
      - id: no_path_note
        message: "Path trace found no devices. Cannot determine routing divergence point without device inventory data."
