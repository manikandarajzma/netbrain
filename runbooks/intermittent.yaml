name: intermittent_connectivity
description: >
  Intermittent connectivity troubleshoot.
  Focus: routing flaps, interface errors, asymmetric routing.
  Always checks routing (not just when ping fails) because intermittent issues
  often show as unstable routes even when ping currently succeeds.

steps:
  - id: path_trace
    tool: path_agent
    input:
      prompt: "{{prompt}}"

  # Gather 72h of incidents+changes — intermittent issues often lag the ticket
  - id: gather_evidence
    parallel:
      - id: servicenow
        tool: servicenow_agent
        input:
          device_names: "{{path_devices}}"
          source_ip: "{{src_ip}}"
          dest_ip: "{{dst_ip}}"
          port: "{{port}}"
          query_type: "incidents_and_changes"
          hours_back: 72

      - id: interface_counters
        tool: interface_counters_agent
        input:
          devices_and_interfaces: "{{path_hops_for_counters}}"

  - id: active_tests
    if: first_hop_device
    then:
      - id: ping_test
        tool: ping_agent
        input:
          device: "{{first_hop_device}}"
          destination: "{{dst_ip}}"
          source_interface: "{{first_hop_lan_interface}}"
          vrf: "{{src_vrf}}"

      # Always check routing for intermittent — instability shows even when ping passes
      - id: routing_check
        if: path_devices
        then:
          - id: routing_check
            tool: routing_check_agent
            input:
              devices: "{{path_devices}}"
              destination: "{{dst_ip}}"
              vrf: "{{src_vrf}}"

      # If firewalls in path, check policy
      - id: firewall_check
        if: has_firewalls
        then:
          - id: panorama
            tool: panorama_agent
            input:
              source_ip: "{{src_ip}}"
              dest_ip: "{{dst_ip}}"
              firewall_hostnames: "{{firewall_hostnames}}"
              port: "{{port}}"
              protocol: "{{protocol}}"

    else:
      - id: routing_fallback
        if: path_devices
        then:
          - id: routing_check
            tool: routing_check_agent
            input:
              devices: "{{path_devices}}"
              destination: "{{dst_ip}}"
              vrf: "{{src_vrf}}"
